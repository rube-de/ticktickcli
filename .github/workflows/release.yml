name: Release

on:
  release:
    types:
      - published

# Each job opts into only the permissions it needs. In particular, the package
# verification job cannot request an npm trusted-publishing identity token.
permissions: {}

concurrency:
  group: npm-release
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  NPM_VERSION: "11.18.0"
  BUN_VERSION: "1.3.14"
  NPM_REGISTRY: https://registry.npmjs.org/

jobs:
  verify:
    name: Verify release package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Set up npm
        shell: bash
        run: |
          set -euo pipefail
          npm install --global --ignore-scripts "npm@${NPM_VERSION}"
          [[ "$(node --version)" =~ ^v24\. ]] || {
            echo "Expected Node.js 24, got $(node --version)" >&2
            exit 1
          }
          [[ "$(npm --version)" == "$NPM_VERSION" ]] || {
            echo "Expected npm ${NPM_VERSION}, got $(npm --version)" >&2
            exit 1
          }

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Validate release metadata and ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail

          [[ "$(bun --version)" == "$BUN_VERSION" ]] || {
            echo "Expected Bun ${BUN_VERSION}, got $(bun --version)" >&2
            exit 1
          }
          [[ "$RELEASE_IS_DRAFT" == "false" ]] || {
            echo "Draft releases cannot be published to npm" >&2
            exit 1
          }
          [[ "$RELEASE_IS_PRERELEASE" == "false" ]] || {
            echo "Prereleases are not supported by this workflow" >&2
            exit 1
          }

          stable_tag_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          [[ "$RELEASE_TAG" =~ $stable_tag_regex ]] || {
            echo "Release tag must be stable SemVer in the form vX.Y.Z: ${RELEASE_TAG}" >&2
            exit 1
          }

          expected_version="${RELEASE_TAG#v}"
          manifest_name="$(node -e '
            const manifest = require("./package.json");
            if (typeof manifest.name !== "string") process.exit(1);
            process.stdout.write(manifest.name);
          ')"
          manifest_version="$(node -e '
            const manifest = require("./package.json");
            if (typeof manifest.version !== "string") process.exit(1);
            process.stdout.write(manifest.version);
          ')"

          [[ "$manifest_name" == "@rube-de/ticktickcli" ]] || {
            echo "Expected package name @rube-de/ticktickcli, got ${manifest_name}" >&2
            exit 1
          }
          [[ "$manifest_version" == "$expected_version" ]] || {
            echo "Release tag ${RELEASE_TAG} does not match package version ${manifest_version}" >&2
            exit 1
          }

          tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse --verify HEAD)"
          [[ "$tag_commit" == "$head_commit" ]] || {
            echo "Checked-out commit ${head_commit} does not match ${RELEASE_TAG} (${tag_commit})" >&2
            exit 1
          }
          git show-ref --verify --quiet refs/remotes/origin/main || {
            echo "origin/main was not fetched" >&2
            exit 1
          }
          git merge-base --is-ancestor "$head_commit" refs/remotes/origin/main || {
            echo "Release commit ${head_commit} is not reachable from origin/main" >&2
            exit 1
          }

      - name: Install dependencies without lifecycle scripts
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run all checks
        run: bun run check

      - name: Build and smoke-test the release artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/npm-package"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          bun run test:package -- --artifact-dir "$artifact_dir"

          shopt -s nullglob
          tarballs=("$artifact_dir"/*.tgz)
          [[ "${#tarballs[@]}" -eq 1 ]] || {
            echo "Expected exactly one release tarball, found ${#tarballs[@]}" >&2
            exit 1
          }
          [[ -f "${tarballs[0]}" && ! -L "${tarballs[0]}" ]] || {
            echo "Release artifact must be a regular, non-symlinked file" >&2
            exit 1
          }

          artifact_entries="$(find "$artifact_dir" -mindepth 1 -maxdepth 1 -print | wc -l | tr -d ' ')"
          [[ "$artifact_entries" == "1" ]] || {
            echo "Artifact directory must contain only the tested tarball" >&2
            exit 1
          }

      - name: Upload the tested package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: ${{ runner.temp }}/npm-package/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  stage:
    name: Stage package on npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_USERCONFIG: /dev/null
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_COLOR: "false"

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Set up npm
        shell: bash
        run: |
          set -euo pipefail
          npm install --global --ignore-scripts "npm@${NPM_VERSION}"
          [[ "$(node --version)" =~ ^v24\. ]] || {
            echo "Expected Node.js 24, got $(node --version)" >&2
            exit 1
          }
          [[ "$(npm --version)" == "$NPM_VERSION" ]] || {
            echo "Expected npm ${NPM_VERSION}, got $(npm --version)" >&2
            exit 1
          }

      - name: Download the tested package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: ${{ runner.temp }}/npm-package

      - name: Validate artifact and registry state
        id: validate
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail

          stable_tag_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          [[ "$RELEASE_IS_PRERELEASE" == "false" && "$RELEASE_TAG" =~ $stable_tag_regex ]] || {
            echo "Only stable vX.Y.Z releases may be staged" >&2
            exit 1
          }

          artifact_dir="$RUNNER_TEMP/npm-package"
          shopt -s nullglob
          tarballs=("$artifact_dir"/*.tgz)
          [[ "${#tarballs[@]}" -eq 1 ]] || {
            echo "Expected exactly one downloaded tarball, found ${#tarballs[@]}" >&2
            exit 1
          }
          tarball="${tarballs[0]}"
          [[ -f "$tarball" && ! -L "$tarball" ]] || {
            echo "Downloaded artifact must be a regular, non-symlinked file" >&2
            exit 1
          }

          manifest_file="$RUNNER_TEMP/npm-package-manifest.json"
          tar -xOf "$tarball" package/package.json > "$manifest_file"
          package_name="$(node -e '
            const manifest = require(process.argv[1]);
            if (typeof manifest.name !== "string") process.exit(1);
            process.stdout.write(manifest.name);
          ' "$manifest_file")"
          package_version="$(node -e '
            const manifest = require(process.argv[1]);
            if (typeof manifest.version !== "string") process.exit(1);
            process.stdout.write(manifest.version);
          ' "$manifest_file")"

          node -e '
            const manifest = require(process.argv[1]);
            const expectedRegistry = process.env.NPM_REGISTRY;
            const failures = [];
            if (manifest.private !== false) failures.push("private must be false");
            if (manifest.bin?.tt !== "src/index.ts") failures.push("bin.tt must be src/index.ts");
            if (manifest.engines?.bun !== ">=1.3.14") failures.push("engines.bun must be >=1.3.14");
            if (manifest.repository?.type !== "git") failures.push("repository.type must be git");
            if (manifest.repository?.url !== "git+https://github.com/rube-de/ticktickcli.git") {
              failures.push("repository.url does not match rube-de/ticktickcli");
            }
            if (manifest.publishConfig?.access !== "public") {
              failures.push("publishConfig.access must be public");
            }
            if (manifest.publishConfig?.registry !== expectedRegistry) {
              failures.push(`publishConfig.registry must be ${expectedRegistry}`);
            }
            if (failures.length > 0) {
              console.error(failures.join("\n"));
              process.exit(1);
            }
          ' "$manifest_file"

          [[ "$package_name" == "@rube-de/ticktickcli" ]] || {
            echo "Expected package name @rube-de/ticktickcli, got ${package_name}" >&2
            exit 1
          }
          [[ "$package_version" == "${RELEASE_TAG#v}" ]] || {
            echo "Artifact version ${package_version} does not match ${RELEASE_TAG}" >&2
            exit 1
          }
          expected_filename="$(node -e '
            const [name, version] = process.argv.slice(1);
            if (!name.startsWith("@") || !name.includes("/")) process.exit(1);
            process.stdout.write(`${name.slice(1).replace("/", "-")}-${version}.tgz`);
          ' "$package_name" "$package_version")" || {
            echo "Could not derive an npm tarball filename for ${package_name}@${package_version}" >&2
            exit 1
          }
          [[ "$(basename "$tarball")" == "$expected_filename" ]] || {
            echo "Artifact filename does not match ${package_name}@${package_version}" >&2
            exit 1
          }

          local_integrity="$(node -e '
            const crypto = require("node:crypto");
            const fs = require("node:fs");
            const bytes = fs.readFileSync(process.argv[1]);
            process.stdout.write(`sha512-${crypto.createHash("sha512").update(bytes).digest("base64")}`);
          ' "$tarball")"
          [[ "$local_integrity" =~ ^sha512-[A-Za-z0-9+/]+={0,2}$ ]] || {
            echo "Failed to calculate a valid SHA-512 package integrity" >&2
            exit 1
          }

          view_output="$RUNNER_TEMP/npm-view.json"
          view_error="$RUNNER_TEMP/npm-view.stderr"
          set +e
          npm view "${package_name}@${package_version}" dist.integrity \
            --json --registry="$NPM_REGISTRY" > "$view_output" 2> "$view_error"
          view_status=$?
          set -e

          if [[ "$view_status" -eq 0 ]]; then
            registry_integrity="$(node -e '
              const fs = require("node:fs");
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              if (typeof value !== "string") process.exit(1);
              process.stdout.write(value);
            ' "$view_output")" || {
              echo "npm returned an invalid dist.integrity value" >&2
              cat "$view_output" >&2
              exit 1
            }

            [[ "$registry_integrity" =~ ^sha512-[A-Za-z0-9+/]+={0,2}$ ]] || {
              echo "npm returned a non-SHA-512 integrity value: ${registry_integrity}" >&2
              exit 1
            }
            [[ "$registry_integrity" == "$local_integrity" ]] || {
              echo "${package_name}@${package_version} already exists with different integrity" >&2
              echo "Local:    ${local_integrity}" >&2
              echo "Registry: ${registry_integrity}" >&2
              exit 1
            }

            echo "should_stage=false" >> "$GITHUB_OUTPUT"
            {
              echo "## npm release"
              echo
              echo "- Package: \`${package_name}@${package_version}\`"
              echo "- Integrity: \`${local_integrity}\`"
              echo "- Result: already published with identical integrity; no staging action was taken."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          error_code="$(node -e '
            const fs = require("node:fs");
            let value;
            try {
              value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            } catch {
              process.exit(1);
            }
            if (typeof value?.error?.code !== "string") process.exit(1);
            process.stdout.write(value.error.code);
          ' "$view_output")" || true

          if [[ "$error_code" != "E404" ]]; then
            echo "npm registry lookup failed with status ${view_status}; refusing to stage" >&2
            cat "$view_error" >&2
            exit 1
          fi

          echo "should_stage=true" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "local_integrity=${local_integrity}" >> "$GITHUB_OUTPUT"

      - name: Stage package for npm approval
        if: steps.validate.outputs.should_stage == 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.validate.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.validate.outputs.package_version }}
          LOCAL_INTEGRITY: ${{ steps.validate.outputs.local_integrity }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=("$RUNNER_TEMP/npm-package"/*.tgz)
          [[ "${#tarballs[@]}" -eq 1 ]] || {
            echo "Expected exactly one validated release tarball" >&2
            exit 1
          }
          tarball="${tarballs[0]}"

          {
            echo "## npm staged release"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${PACKAGE_VERSION}\`"
            echo "- Tag: \`latest\`"
            echo "- Integrity: \`${LOCAL_INTEGRITY}\`"
            echo "- Next step: review and approve this package in npm's Staged Packages view."
          } >> "$GITHUB_STEP_SUMMARY"

          npm stage publish "$tarball" --tag latest --ignore-scripts --registry="$NPM_REGISTRY"
